name: Telegram Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: timeout 270 python bot.py || true
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      ADMIN_ID: ${{ secrets.ADMIN_ID }}
